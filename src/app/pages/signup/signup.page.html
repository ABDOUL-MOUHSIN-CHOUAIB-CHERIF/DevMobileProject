<ion-content class="ion-padding">
  <div class="header-section">
    <h4 class="title"> 🛄 SOVEREIGN</h4>
    <p class="subtitle">Create your vault</p>
  </div>

  <form #signUpForm="ngForm" (ngSubmit)="onSignUp(signUpForm)">
    <div class="input-group">
      <ion-label position="stacked" class="input-label">Full Name</ion-label>
      <ion-input type="text" name="fullName" ngModel required placeholder="Alexander" class="custom-input"></ion-input>
    </div>

    <div class="input-group">
      <ion-label position="stacked" class="input-label">E-Mail</ion-label>
      <ion-input type="email" name="email" ngModel required placeholder="name@gmail.com" class="custom-input"></ion-input>
    </div>

    <div class="input-group">
      <ion-label position="stacked" class="input-label">Password</ion-label>
      <ion-input type="password" name="password" ngModel required minlength="8" placeholder="***********" class="custom-input"></ion-input>
    </div>

    <div class="input-group">
      <ion-label position="stacked" class="input-label">Confirm Password</ion-label>
      <ion-input type="password" name="confirmPassword" ngModel required placeholder="**************" class="custom-input"></ion-input>
    </div>

   
    <ion-button type="submit"  [disabled]="!signUpForm.valid" expand="block" class="create-account-button">
      Create Account
      <ion-icon slot="end" name="arrow-forward-outline"></ion-icon>
    </ion-button>
  </form>

  <div class="footer-section">
    <div class="login-link">
      <span>Already have an account?</span>
      <ion-text color="primary" (click)="goToLogin()" style="cursor: pointer;"> Log in</ion-text>
    </div>
  </div>
</ion-content>
