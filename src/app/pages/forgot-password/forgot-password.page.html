<ion-content [fullscreen]="true" class="forgot-container">

  <div class="forgot-wrapper">

    <!-- Header -->
    <div class="header-section">
      <ion-icon name="shield-checkmark-outline" class="header-icon"></ion-icon>
      <h1 class="title">SOVEREIGN</h1>
      <h2 class="subtitle">Two-Step Verification</h2>
      <p class="description">
        Enter the 4-digit code sent to your device ending in
        <strong>8829</strong>
      </p>
    </div>

    <!-- OTP -->
    <div class="otp-section">
      <div class="otp-container">
        <input type="text" maxlength="1" class="otp-input">
        <input type="text" maxlength="1" class="otp-input">
        <input type="text" maxlength="1" class="otp-input">
        <input type="text" maxlength="1" class="otp-input">
      </div>

      <ion-button expand="block" class="verify-button">
        Verify Identity
        <ion-icon slot="end" name="arrow-forward-outline"></ion-icon>
      </ion-button>
    </div>

    <!-- Resend -->
    <div class="resend-section">
      <ion-text>Resend Code</ion-text>
      <span class="expiry-timer">Expires in 2:00</span>
    </div>

    <!-- Help -->
    <div class="help-section">
      <ion-icon name="help-circle-outline"></ion-icon>
      <p>
        Having trouble? Check your connection or use email verification.
      </p>
    </div>

    <!-- Alternative -->
    <div class="alternative-method">
      <div class="method-icon">
        <ion-icon name="mail-outline"></ion-icon>
      </div>

      <div class="method-details">
        <h4>Email authentication</h4>
        <p>Send code to your email</p>
      </div>

      <ion-icon
        name="chevron-forward-outline"
        class="chevron"
      ></ion-icon>
    </div>

  </div>

</ion-content>
