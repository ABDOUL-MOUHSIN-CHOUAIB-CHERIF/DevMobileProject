<ion-header class="ion-no-border">
  <div class="custom-header">
    <button class="close-btn"><ion-icon name="close-outline"></ion-icon></button>
    <ion-title>Add Transaction</ion-title>
    <button class="done-btn"><ion-icon name="checkmark-circle-outline"></ion-icon></button>
  </div>
</ion-header>

<!-- ERROR FIX: Change the stray </ion-content> to an opening <ion-content> tag -->
<ion-content>
  <!-- TYPE TOGGLE -->
  <div class="toggle-container">
    <div class="toggle-pill">
      <button class="toggle-btn active">Expense</button>
      <button class="toggle-btn">Income</button>
    </div>
  </div>

  <!-- AMOUNT INPUT -->
  <div class="amount-section">
    <p class="section-label">AMOUNT</p>
    <div class="currency-display">
      <span class="value">0.00</span>
      <span class="  symbol">XAF</span>
    </div>
  </div>

  <!-- SMART SCAN BANNER -->
  <div class="smart-scan-card">
    <div class="scan-icon-box">
      <ion-icon name="scan-outline"></ion-icon>
    </div>
    <div class="scan-text">
      <h3>Smart Scan</h3>
      <p>Auto-extract details from receipt</p>
    </div>
    <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
  </div>

  <!-- CATEGORY SELECTION -->
  <div class="section-header">
    <span class="title">Category</span>
    <span class="action">SEE ALL</span>
  </div>

  <div class="category-grid">
    <div class="cat-item">
      <div class="icon-box"><ion-icon name="restaurant-outline"></ion-icon></div>
      <span>Food</span>
    </div>
    <div class="cat-item active">
      <div class="icon-box"><ion-icon name="cash-outline"></ion-icon></div>
      <span>Salary</span>
    </div>
    <div class="cat-item">
      <div class="icon-box"><ion-icon name="medical-outline"></ion-icon></div>
      <span>Health</span>
    </div>
    <div class="cat-item">
      <div class="icon-box"><ion-icon name="swap-horizontal-outline"></ion-icon></div>
      <span>Transfer</span>
    </div>
    <div class="cat-item">
      <div class="icon-box"><ion-icon name="cart-outline"></ion-icon></div>
      <span>Retail</span>
    </div>
  </div>

  <!-- CONTACTS -->
  <div class="section-header">
    <span class="title">Link to Contact</span>
  </div>
  <div class="contact-list">
    <div class="contact-item">
      <div class="contact-circle add-new"><ion-icon name="add-outline"></ion-icon></div>
      <span>New</span>
    </div>
   
    <div class="contact-item">
      <div class="contact-circle"><img src="https://i.pravatar.cc/100?img=33" /></div>
      <span>David K.</span>
    </div>
  </div>

  <!-- DATE & TIME -->
  <div class="row">
    <div class="col">
      <p class="section-label">DATE</p>
      <div class="input-box">
        <ion-icon name="calendar-outline"></ion-icon>
        <span>Oct 24, 2026</span>
      </div>
    </div>
    <div class="col">
      <p class="section-label">TIME</p>
      <div class="input-box">
        <ion-icon name="time-outline"></ion-icon>
        <span>14:30 PM</span>
      </div>
    </div>
  </div>

  <!-- NOTES -->
  <div class="section-header">
    <span class="title">ADD NOTE</span>
  </div>
  <ion-textarea placeholder="Description of your transaction..." class="note-area"></ion-textarea>

  <!-- SAVE BUTTON -->
  <div class="button-wrapper">
    <button class="save-btn">Save Transaction</button>
  </div>

  <div class="spacer"></div>
</ion-content>
