<ion-content [fullscreen]="true" class="login-container">

  <div class="login-wrapper">

    <!-- Brand Header -->
    <div class="header-section">
      <ion-icon name="wallet-outline" class="brand-icon"></ion-icon>
      <h2 class="brand-title">SOVEREIGN</h2>
      <p class="subtitle">Welcome Back</p>
      <p class="description">
        Access your secure wealth portal
      </p>
    </div>

    <!-- Login Card -->
    <ion-card class="login-card">
      <ion-card-content>

        <!-- Email -->
        <ion-item lines="none" class="input-item">
          <ion-label position="stacked">Email Address</ion-label>
          <ion-input
            type="email"
            placeholder="name@gmail.com"
          ></ion-input>
        </ion-item>

        <!-- Password -->
        <ion-item lines="none" class="input-item">
          <ion-label position="stacked">Password</ion-label>
          <ion-input
            type="password"
            placeholder="************"
          ></ion-input>
        </ion-item>

        <div class="forgot-password" (click)="goToPassword()">
          Forgot password?
        </div>

        <!-- Main Button -->
        <ion-button expand="block" class="sign-in-btn">
          Sign In
          <ion-icon slot="end" name="arrow-forward-outline"></ion-icon>
        </ion-button>

        <!-- OTP Button -->
        <ion-button
          expand="block"
          fill="outline"
          class="otp-btn"
        >
          <ion-icon slot="start" name="shield-checkmark-outline"></ion-icon>
          Sign In with OTP
        </ion-button>

      </ion-card-content>
    </ion-card>

    <!-- Footer -->
    <div class="footer-link">
      Don’t have an account?
      <span (click)="goToSignup()">Sign Up</span>
    </div>

  </div>

</ion-content>
